<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maksymilian Wojtkowski</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #114330 0%, #2ecc71 100%); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 30px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); 
            letter-spacing: -1px;
            text-align: center;
            padding: 0 10px;
        }
        .icons {
            display: flex;
            gap: 30px;
            margin-bottom: 25px;
            justify-content: center;
        }
        .icons a {
            color: white; 
            font-size: 3rem;
            text-decoration: none;
            transition: transform 0.3s ease, color 0.3s ease, filter 0.3s ease;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
        }
        .icons a:hover {
            transform: scale(1.25) translateY(-5px); 
            color: #fbbf24; 
            filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.7)); 
        }
        #description {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 1px;
            min-height: 35px;
            color: #fbbf24; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(10px); 
            text-align: center;
            padding: 0 15px;
        }
        #description.show {
            opacity: 1;
            transform: translateY(0); 
        }
        footer {
            position: absolute;
            bottom: 20px;
            font-size: 1rem;
            opacity: 0.7;
            font-weight: 300;
            text-align: center;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
                margin-bottom: 20px;
            }
            .icons {
                flex-wrap: wrap;
                gap: 20px;
                padding: 0 20px;
            }
            .icons a {
                font-size: 2.3rem;
            }
            #description {
                font-size: 1.1rem;
                min-height: 50px;
            }
            footer {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <h1>maks.wojtkowski</h1>
    
    <div class="icons">
        <a href="https://github.com/MaksWojtkowski" target="_blank" data-text="GitHub, czyli co kodzę 💻"><i class="fab fa-github"></i></a>
        <a href="https://www.linkedin.com/in/maks-wojtkowski" target="_blank" data-text="LinkedIn, czyli nad czym pracuję 👔"><i class="fab fa-linkedin"></i></a>
        <a href="https://www.instagram.com/maks_wojtkowski" target="_blank" data-text="Instagram, czyli gdzie jestem 🏝️"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/maks.wojtkowski" target="_blank" data-text="Facebook, czyli co robię 🤝"><i class="fab fa-facebook"></i></a>
        <a href="https://www.youtube.com/@makswojtkowski1819" target="_blank" data-text="YouTube, czyli moja zajawka 📹"><i class="fab fa-youtube"></i></a>
        <a href="https://open.spotify.com/user/31qyfvwyxhjugsmxvvqlu4ycglmq" target="_blank" data-text="Spotify, czyli czego słucham 🎧"><i class="fab fa-spotify"></i></a>
    </div>

    <div id="description">Wybierz platformę</div>

    <footer>Maksymilian Wojtkowski &copy; 2026 | WRO/LGN</footer>

    <script>
        const links = document.querySelectorAll('.icons a');
        const descriptionBox = document.getElementById('description');

        links.forEach(link => {
            link.addEventListener('mouseenter', function() {
                descriptionBox.textContent = this.getAttribute('data-text');
                descriptionBox.classList.add('show');
            });

            link.addEventListener('mouseleave', function() {
                descriptionBox.classList.remove('show');
            });
        });
    </script>
</body>
</html>
